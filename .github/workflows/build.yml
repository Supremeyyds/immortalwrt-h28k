name: 每日编译 OPC-H28K

on:
  schedule:
    # 每天北京时间 11:00 (UTC 03:00)，避开高峰
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      clean_build:
        description: '是否全量重新编译（clean build）'
        type: boolean
        default: false

concurrency:
  group: build-opc-h28k
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 检查磁盘空间
        run: |
          echo "=== 初始磁盘状态 ==="
          df -h /
          echo ""
          # Actions runner 默认 ~40GB 可用

      - name: 清理不需要的预装软件 (释放空间)
        run: |
          echo "=== 清理前 ==="
          df -h / | tail -1
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          sudo rm -rf /opt/ghc 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache 2>/dev/null || true
          sudo rm -rf /usr/local/.ghcup 2>/dev/null || true
          sudo rm -rf /usr/local/share/powershell 2>/dev/null || true
          sudo rm -rf /usr/local/share/chromium 2>/dev/null || true
          sudo rm -rf /usr/share/swift 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          echo "=== 清理后 ==="
          df -h / | tail -1

      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-dev python3-setuptools rsync \
            unzip zlib1g-dev file wget ccache upx-ucl time

      - name: 配置 ccache
        run: |
          ccache --version
          ccache -M 2G
          ccache -s
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: 设置 git 用户
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: 同步上游并 rebase
        run: |
          echo "=== 添加 upstream remote ==="
          git remote add upstream https://github.com/immortalwrt/immortalwrt.git || true
          git fetch upstream openwrt-25.12

          echo "=== 上游最新: $(git rev-parse upstream/openwrt-25.12) ==="
          echo "=== 当前 HEAD: $(git rev-parse HEAD) ==="

          if git rebase upstream/openwrt-25.12; then
            echo "✅ Rebase 成功"
          else
            echo "❌ Rebase 冲突！请手动处理。"
            git diff --name-only --diff-filter=U || true
            exit 1
          fi

          echo ""
          echo "=== Rebase 后的 commits ==="
          git log --oneline upstream/openwrt-25.12..HEAD

      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-roc-${{ hashFiles('.github/configs/opc-h28k.config') }}-${{ github.run_number }}
          restore-keys: |
            ccache-roc-${{ hashFiles('.github/configs/opc-h28k.config') }}-
            ccache-roc-

      - name: 更新 feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 应用配置
        run: |
          cp .github/configs/opc-h28k.config .config
          make olddefconfig
          echo ""
          echo "=== 目标设备 ==="
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE" .config | grep "=y"

      - name: 下载源码包
        timeout-minutes: 30
        run: |
          make -j$(nproc) download V=s
          echo "=== 下载完成，磁盘状态 ==="
          df -h / | tail -1

      - name: 编译
        timeout-minutes: 300
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          echo "=== 开始编译 $(date) ==="
          make -j$(nproc) V=s 2>&1 | tee build.log
          echo "exit code: ${PIPESTATUS[0]}"
          echo ""
          echo "=== 编译完成 $(date) ==="
          echo ""
          echo "=== 磁盘状态 ==="
          df -h / | tail -1
          echo ""
          echo "=== ccache 统计 ==="
          ccache -s

      - name: 检查产物
        run: |
          echo "=== 编译产物 ==="
          find bin/targets/rockchip/armv8/ -type f -name "*opc-h28k*" -o -name "*OPC*" 2>/dev/null || echo "未找到 OPC-H28K 固件"
          echo ""
          echo "=== bin 目录内容 ==="
          ls -lh bin/targets/rockchip/armv8/ 2>/dev/null || echo "bin 目录为空"
          echo ""
          echo "=== Profiles ==="
          cat bin/targets/rockchip/armv8/profiles.json 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "无 profiles"

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: opc-h28k-firmware
          path: |
            bin/targets/rockchip/armv8/*opc-h28k*
            bin/targets/rockchip/armv8/*OPC-H28K*
            bin/targets/rockchip/armv8/profiles.json
          retention-days: 60

      - name: 上传编译日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failed
          path: build.log
          retention-days: 7

      - name: 通知
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 编译成功！固件已上传到 Artifacts"
          else
            echo "❌ 编译失败，请检查日志"
          fi
