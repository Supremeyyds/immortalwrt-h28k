name: 每日编译 OPC-H28K

on:
  schedule:
    # 每天北京时间 11:00 (UTC 03:00)，避开高峰
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      clean_build:
        description: '是否全量重新编译（clean build）'
        type: boolean
        default: false

concurrency:
  group: build-opc-h28k
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 检出仓库 (配置和 patch)
        uses: actions/checkout@v4

      - name: 检查磁盘空间
        run: |
          echo "=== 初始磁盘状态 ==="
          df -h /

      - name: 清理不需要的预装软件 (释放空间)
        run: |
          echo "=== 清理前 ==="
          df -h / | tail -1
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          sudo rm -rf /opt/ghc 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache 2>/dev/null || true
          sudo rm -rf /usr/local/.ghcup 2>/dev/null || true
          sudo rm -rf /usr/local/share/powershell 2>/dev/null || true
          sudo rm -rf /usr/local/share/chromium 2>/dev/null || true
          sudo rm -rf /usr/share/swift 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          echo "=== 清理后 ==="
          df -h / | tail -1

      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-dev python3-setuptools python3-pyelftools rsync \
            unzip zlib1g-dev file wget ccache upx-ucl time

      - name: 配置 ccache
        run: |
          ccache -M 2G
          ccache -s
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-opc-h28k-${{ github.run_number }}
          restore-keys: |
            ccache-opc-h28k-

      - name: 克隆上游源码
        run: |
          git clone -b openwrt-25.12 --single-branch --depth=1 \
            https://github.com/immortalwrt/immortalwrt.git immortalwrt
          echo "=== 克隆完成，磁盘状态 ==="
          df -h / | tail -1

      - name: 应用 OPC-H28K 补丁
        working-directory: immortalwrt
        run: |
          git apply --3way ../patches/0001-opc-h28k.patch || {
            echo "❌ Patch 应用失败！上游代码可能已大幅变更，需要手动更新 patch。"
            echo "   1. 本地重新 git clone immortalwrt"
            echo "   2. 手动修改目标文件 "
            echo "   3. git diff > patches/0001-opc-h28k.patch"
            echo "   4. 推送更新"
            exit 1
          }
          echo "✅ Patch 应用成功"
          git diff --stat

      - name: 应用编译配置
        working-directory: immortalwrt
        run: |
          cp ../.github/configs/opc-h28k.config .config
          make defconfig 2>&1 || {
            echo "=== defconfig failed, trying with full verbose output ==="
            make defconfig V=sc
            exit 1
          }
          echo ""
          echo "=== 目标设备 ==="
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE" .config | grep "=y"

      - name: 更新 feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载源码包
        working-directory: immortalwrt
        timeout-minutes: 30
        run: |
          make -j$(nproc) download V=s
          echo "=== 下载完成，磁盘状态 ==="
          df -h / | tail -1

      - name: 编译
        working-directory: immortalwrt
        timeout-minutes: 300
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          echo "=== 开始编译 $(date) ==="
          make -j$(nproc) V=s 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          echo "exit code: $code"
          echo "=== 编译完成 $(date), 退出码: $code ==="
          echo ""
          echo "=== 磁盘状态 ==="
          df -h / | tail -1
          echo ""
          echo "=== ccache 统计 ==="
          ccache -s
          if [ $code -ne 0 ]; then
            echo "编译过程出错 (exit code: $code)"
            tail -100 build.log
            exit $code
          fi

      - name: 检查产物
        working-directory: immortalwrt
        run: |
          echo "=== 编译产物 ==="
          find bin/targets/rockchip/armv8/ -type f \( -name "*opc-h28k*" -o -name "*OPC*" -o -name "*h28k*" \) 2>/dev/null || true
          echo ""
          echo "=== bin 目录内容 ==="
          ls -lh bin/targets/rockchip/armv8/ 2>/dev/null || echo "bin 目录为空"
          echo ""
          echo "=== Profiles ==="
          cat bin/targets/rockchip/armv8/profiles.json 2>/dev/null && echo "" || echo "无 profiles.json"

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: opc-h28k-firmware
          path: immortalwrt/bin/targets/rockchip/armv8/
          retention-days: 60

      - name: 上传编译日志 (仅失败时)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failed
          path: immortalwrt/build.log
          retention-days: 7

      - name: 结果通知
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ OPC-H28K 编译成功！"
            echo "固件请到: https://github.com/Supremeyyds/immortalwrt-h28k/actions 下载"
          elif [ "${{ job.status }}" == "failure" ]; then
            echo "❌ 编译失败，请检查上方日志"
            echo "https://github.com/Supremeyyds/immortalwrt-h28k/actions/runs/${{ github.run_id }}"
          else
            echo "⚠️ 编译状态: ${{ job.status }}"
          fi
